syntax = "proto3";

package yat;

option go_package = "yat.io/yat/wire";

// pub and msg
message Msg {
  uint64 num  = 1;
  bytes path  = 2;
  bytes data  = 3;
  bytes inbox = 4;
}

message SubFrame {
  uint64 num   = 1;
  bytes path   = 2;
  bytes group  = 3;
  int64 limit  = 4;
}

message UnsubFrame {
  uint64 num = 1;
}
